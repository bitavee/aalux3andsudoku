[platformio]
default_envs = default
extra_configs = platformio.local.ini

[aalu]
version = 2.8.2

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
  -DUSB_MANUFACTURER="\"AALU\""
  -DUSB_PRODUCT="\"AALU Reader\""
  -DAALU_VERSION=\"${aalu.version}\"
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
# Increase PNG scanline buffer to support up to 2048px wide images
# Default is (320*4+1)*2=2562, we need more for larger images
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort
  -fno-exceptions

build_unflags =
  -std=gnu++11
  -fexceptions

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/patch_jpegdec.py
  pre:scripts/patch_einkdisplay.py
  pre:scripts/git_branch.py

; Libraries
lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  bitbank2/JPEGDEC @ ^1.8.0
  links2004/WebSockets @ 2.7.3
[env:default]
extends = base
build_flags =
  ${base.build_flags}
  ; A verziot innen kivettuk, mert a scripts/git_branch.py automatikusan beallitja!
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds

[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release builds

[env:gh_release_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds  

[env:slim]
extends = base
build_flags =
  ${base.build_flags}
  ; serial output is disabled in slim builds to save space
  -UENABLE_SERIAL_LOG

; -----------------------------------------------------------------------------
; SDL2-backed desktop simulator. Compiles src/ + lib/ as a native binary,
; links SDL2, renders the e-ink panel as a window. Powered by the
; uxjulia/crosspoint-simulator PlatformIO library.
;
; Prereqs (macOS):  brew install sdl2
; Build:            pio run -e simulator       (or `make sim-build`)
; Build + launch:   pio run -e simulator -t run_simulator   (or `make sim`)
; Books:            drop EPUBs into ./fs_/books/ (gitignored sandbox FS)
;
; NOTE: This env intentionally does NOT extend [base] because the base build
; flags include ESP-IDF linker wrap directives that break native builds.
; -----------------------------------------------------------------------------
[env:simulator]
platform = native
lib_compat_mode = off
custom_run_simulator_target_owner = project

; The crosspoint-simulator lib provides host-backed shims for every Arduino
; / ESP-IDF header AALU's network and OTA code touches (HTTPClient, WiFi,
; esp_http_client, esp_https_ota, NetworkClient, DNSServer, ESPmDNS, etc).
; That means we can compile the whole tree as-is — with two exceptions: the
; crosspoint-simulator lib itself DEFINES firmware_flash::* and ota_boot::* in
; simulator_firmware.cpp, so our real device implementations must be excluded
; or the linker sees duplicate symbols. The sim stub headers under
; src/simulator/sim_stubs/network/ provide the declarations instead.
; If a specific source ever depends on a header the sim doesn't shim, add an
; exclusion here.
build_src_filter =
  +<*>
  -<network/FirmwareFlasher.cpp>
  -<network/OtaBootSwitch.cpp>
  -<network/OtaUpdater.cpp>

build_flags =
  -std=gnu++2a
  !sdl2-config --cflags --libs
  -Wno-c++11-narrowing
  -DSIMULATOR
  -DAALU_VERSION=\"sim\"
  -DCROSSPOINT_VERSION=\"sim\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -DUSE_UTF8_LONG_NAMES=1
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
  -Isrc
  -Isrc/simulator/sim_stubs
  -include src/simulator/sim_compat.h

; The crosspoint-simulator lib provides full host-backed implementations of
; the Hal* classes (HalDisplay, HalGPIO, HalStorage, HalSystem,
; HalPowerManager) plus the lower-level EInkDisplay / InputManager /
; SDCardManager / BatteryMonitor and a WebSocketsServer shim. We ignore
; AALU's lib/hal/ + the open-x4-sdk symlinks + the Arduino WebSockets lib
; so the linker doesn't see duplicate class definitions. The sim's surface
; is a superset of AALU's, so all of AALU's HAL callers keep working.
lib_ignore =
  hal
  EInkDisplay
  InputManager
  SDCardManager
  BatteryMonitor
  WebSockets
  PNGdec
  JPEGDEC

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/patch_simulator_lib.py
  post:.pio/libdeps/$PIOENV/simulator/run_simulator_project.py

lib_deps =
  simulator=https://github.com/uxjulia/crosspoint-simulator#efe37c6779e1f977cb361240f56ba4028d1c13f6
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  links2004/WebSockets @ 2.7.3