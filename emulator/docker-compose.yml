services:
  aalu-emulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aalu-emulator
    ports:
      - "8080:8080"
    volumes:
      - ./sdcard:/sdcard
      - ./web:/web
    environment:
      AALU_SDCARD: /sdcard
      AALU_WEB_ROOT: /web
      AALU_PORT: "8080"
    restart: unless-stopped
